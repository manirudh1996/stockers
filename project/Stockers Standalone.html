  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 activeSecStocks = [];\nlet viewAllOpen = false;\n\n// ── UTILS ──\nconst fp = v => v.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});\nconst fc = v => (v>=0?'+':'')+v.toFixed(2)+'%';\nfunction heatColor(c) {\n  if(c>=4) return '#00c853'; if(c>=2) return '#2e7d32';\n  if(c>=.5) return '#388e3c'; if(c>=0) return '#1b5e20';\n  if(c>-.5) return '#7f0000'; if(c>-2) return '#b71c1c';\n  if(c>-4) return '#c62828'; return '#d50000';\n}\n\n// ── TREEMAP ──\nfunction treeLayout(items,x,y,w,h){\n  if(!items.length) return [];\n  if(items.length===1) return [{...items[0],x,y,w:Math.max(w,0),h:Math.max(h,0)}];\n  const total=items.reduce((s,i)=>s+i.mcap,0);\n  let sum=0,split=1;\n  for(let i=0;i<items.length-1;i++){sum+=items[i].mcap;if(sum>=total/2){split=i+1;break;}}\n  const first=items.slice(0,split),second=items.slice(split);\n  if(!second.length) return treeLayout(first,x,y,w,h);\n  const ratio=first.reduce((s,i)=>s+i.mcap,0)/total;\n  return w>=h\n    ?[...treeLayout(first,x,y,w*ratio,h),...treeLayout(second,x+w*ratio,y,w*(1-ratio),h)]\n    :[...treeLayout(first,x,y,w,h*ratio),...treeLayout(second,x,y+h*ratio,w,h*(1-ratio))];\n}\nfunction buildTreemap(stocks,containerId,height){\n  const el=document.getElementById(containerId);\n  if(!el) return;\n  el.innerHTML='';\n  el.style.height=height+'px';\n  const W=el.clientWidth||el.getBoundingClientRect().width||1100;\n  const sorted=[...stocks].sort((a,b)=>b.mcap-a.mcap);\n  const tiles=treeLayout(sorted,0,0,W,height);\n  tiles.forEach(t=>{\n    const d=document.createElement('div');\n    d.className='hm-block';\n    d.style.cssText=`left:${t.x.toFixed(1)}px;top:${t.y.toFixed(1)}px;width:${t.w.toFixed(1)}px;height:${t.h.toFixed(1)}px;background:${heatColor(t.chg)}`;\n    const min=Math.min(t.w,t.h);\n    const ss=min>90?15:min>60?13:min>40?10:8;\n    const cs=min>90?12:min>60?10:min>40?9:7;\n    d.innerHTML=`${t.w>70?`<span class=\"hm-sec\">${t.sector}<\u002Fspan>`:''}\n      <span class=\"hm-sym\" style=\"font-size:${ss}px\">${t.sym}<\u002Fspan>\n      ${min>36?`<span class=\"hm-chg\" style=\"font-size:${cs}px\">${fc(t.chg)}<\u002Fspan>`:''}`;\n    d.title=`${t.sym} — ${t.name}\\n₹${fp(t.price)}  ${fc(t.chg)}`;\n    d.addEventListener('click',()=>openPopup(STOCKS.find(x=>x.sym===t.sym)||t));\n    el.appendChild(d);\n  });\n}\n\n// ── INDEX SELECTOR ──\nfunction buildIndexSelector(){\n  const el=document.getElementById('idxSelector');\n  el.innerHTML=INDICES.map(idx=>`\n    <div class=\"idx-pill ${idx.id===activeIdx?'on':''}\" id=\"ip-${idx.id}\" onclick=\"selectIdx('${idx.id}')\">\n      <span class=\"idx-pill-name\">${idx.label}<\u002Fspan>\n      <span class=\"idx-pill-val\">${idx.val.toLocaleString('en-IN',{maximumFractionDigits:0})}<\u002Fspan>\n      <span class=\"idx-pill-chg ${idx.chg>=0?'pos':'neg'}\">${fc(idx.chg)}<\u002Fspan>\n    <\u002Fdiv>`).join('');\n}\nfunction selectIdx(id){\n  activeIdx=id;\n  document.querySelectorAll('.idx-pill').forEach(p=>p.classList.remove('on'));\n  const el=document.getElementById('ip-'+id);\n  if(el) el.classList.add('on');\n  const idx=INDICES.find(x=>x.id===id);\n  document.getElementById('hmTitle').textContent=`${idx.label} — HEAT MAP`;\n  document.getElementById('niftyNum').textContent=idx.val.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});\n  document.getElementById('niftyPill').textContent=(idx.chg>=0?'▲ +':'▼ ')+Math.abs(idx.chg).toFixed(2)+'%';\n  document.getElementById('niftyPill').className='nifty-pill '+(idx.chg>=0?'pos':'neg');\n  document.getElementById('niftyPill').style.background=idx.chg>=0?'var(--green-dim)':'var(--red-dim)';\n  const filtered=STOCKS.filter(s=>s.idx.some(t=>idx.tags.includes(t)));\n  renderMovers(filtered);\n  requestAnimationFrame(()=>requestAnimationFrame(()=>buildTreemap(filtered,'mainHeatmap',430)));\n}\n\n// ── MOVERS ──\nfunction renderMovers(stocks){\n  stocks=stocks||STOCKS.filter(s=>s.idx.includes('n50'));\n  const by=[...stocks].sort((a,b)=>b.chg-a.chg);\n  const gainers=by.slice(0,8), losers=by.slice(-8).reverse();\n  document.getElementById('gainersEl').innerHTML=gainers.map((s,i)=>`\n    <div class=\"mrow\" onclick=\"openPopup(STOCKS.find(x=>x.sym==='${s.sym}'))\">\n      <span class=\"m-rank\">${i+1}<\u002Fspan><span class=\"m-sym\">${s.sym}<\u002Fspan>\n      <span class=\"m-name\">${s.name}<\u002Fspan><span class=\"m-price\">₹${fp(s.price)}<\u002Fspan>\n      <span class=\"m-chg g\">${fc(s.chg)}<\u002Fspan><\u002Fdiv>`).join('');\n  document.getElementById('losersEl').innerHTML=losers.map((s,i)=>`\n    <div class=\"mrow\" onclick=\"openPopup(STOCKS.find(x=>x.sym==='${s.sym}'))\">\n      <span class=\"m-rank\">${i+1}<\u002Fspan><span class=\"m-sym\">${s.sym}<\u002Fspan>\n      <span class=\"m-name\">${s.name}<\u002Fspan><span class=\"m-price\">₹${fp(s.price)}<\u002Fspan>\n      <span class=\"m-chg r\">${fc(s.chg)}<\u002Fspan><\u002Fdiv>`).join('');\n}\n\n// ── SECTORS ──\nfunction renderSectors(){\n  const map={};\n  STOCKS.forEach(s=>{(map[s.sector]=map[s.sector]||[]).push(s);});\n  const grid=document.getElementById('sectorGrid');\n  grid.innerHTML='';\n  Object.keys(map).sort((a,b)=>map[b].reduce((s,x)=>s+x.mcap,0)-map[a].reduce((s,x)=>s+x.mcap,0)).forEach(sec=>{\n    const stocks=map[sec];\n    const avg=stocks.reduce((s,x)=>s+x.chg,0)/stocks.length;\n    const card=document.createElement('div');\n    card.className='sec-card'; card.id='sc-'+sec;\n    card.innerHTML=`<div class=\"sec-icon\">${SECTOR_META[sec]||'📈'}<\u002Fdiv>\n      <div class=\"sec-nm\" style=\"color:${SECTOR_COLOR[sec]||'#fff'}\">${sec}<\u002Fdiv>\n      <div class=\"sec-chg ${avg>=0?'pos':'neg'}\">${fc(avg)}<\u002Fdiv>\n      <div class=\"sec-cnt\">${stocks.length} stocks<\u002Fdiv>`;\n    card.addEventListener('click',()=>openSecDetail(sec,stocks));\n    grid.appendChild(card);\n  });\n}\nfunction openSecDetail(sec,stocks){\n  document.querySelectorAll('.sec-card').forEach(c=>c.classList.remove('active'));\n  const c=document.getElementById('sc-'+sec); if(c) c.classList.add('active');\n  activeSecStocks=stocks;\n  viewAllOpen=false;\n  document.getElementById('secAllStocks').classList.remove('open');\n  document.getElementById('viewAllBtn').textContent=`View All ${stocks.length} Stocks ▾`;\n  const avg=stocks.reduce((s,x)=>s+x.chg,0)/stocks.length;\n  const tmcap=stocks.reduce((s,x)=>s+x.mcap,0);\n  document.getElementById('secDetailTitle').textContent=`${SECTOR_META[sec]||''} ${sec.toUpperCase()} SECTOR`;\n  document.getElementById('secDetailSub').textContent=`${stocks.length} stocks  ·  Avg ${fc(avg)}  ·  Total mkt cap ₹${tmcap.toFixed(1)}T`;\n  document.getElementById('saTitle').textContent=`All ${sec} Stocks (${stocks.length})`;\n  const wrap=document.getElementById('secDetailWrap');\n  wrap.style.display='block';\n  requestAnimationFrame(()=>requestAnimationFrame(()=>buildTreemap(stocks,'secHeatmap',380)));\n  renderSecAllTable(stocks);\n  const top=wrap.getBoundingClientRect().top+window.scrollY-20;\n  window.scrollTo({top,behavior:'smooth'});\n}\nfunction renderSecAllTable(stocks){\n  const sorted=[...stocks].sort((a,b)=>b.mcap-a.mcap);\n  document.getElementById('secAllBody').innerHTML=sorted.map((s,i)=>`<tr style=\"cursor:pointer\" onclick=\"openPopup(STOCKS.find(x=>x.sym==='${s.sym}'))\">\n    <td style=\"color:var(--text3)\">${i+1}<\u002Ftd>\n    <td class=\"wl-sym-cell\">${s.sym}<\u002Ftd>\n    <td style=\"color:var(--text2)\">${s.name}<\u002Ftd>\n    <td class=\"wl-price-cell\">₹${fp(s.price)}<\u002Ftd>\n    <td class=\"wl-chg-cell ${s.chg>=0?'pos':'neg'}\">${fc(s.chg)}<\u002Ftd>\n    <td style=\"font-family:var(--mono);color:var(--text2)\">₹${s.mcap}T<\u002Ftd>\n  <\u002Ftr>`).join('');\n}\nfunction toggleViewAll(){\n  viewAllOpen=!viewAllOpen;\n  const el=document.getElementById('secAllStocks');\n  el.classList.toggle('open',viewAllOpen);\n  document.getElementById('viewAllBtn').textContent=viewAllOpen\n    ?'Hide Stocks ▴':`View All ${activeSecStocks.length} Stocks ▾`;\n  if(viewAllOpen) el.scrollIntoView=()=>{}; // noop — let natural scroll handle it\n}\nfunction closeSecDetail(){\n  document.getElementById('secDetailWrap').style.display='none';\n  document.querySelectorAll('.sec-card').forEach(c=>c.classList.remove('active'));\n  viewAllOpen=false;\n}\n\n// ── TICKER ──\nfunction buildTicker(){\n  const items=[...STOCKS].filter(s=>s.idx.includes('n50')||s.idx.includes('bnk')).sort(()=>0.5-Math.random());\n  const html=items.map(s=>`<span class=\"ti\"><span class=\"ti-sym\">${s.sym}<\u002Fspan><span class=\"ti-p\">₹${fp(s.price)}<\u002Fspan><span class=\"${s.chg>=0?'pos':'neg'}\">${fc(s.chg)}<\u002Fspan><\u002Fspan>`).join('');\n  document.getElementById('tickerTrack').innerHTML=html+html;\n}\n\n// ── WATCHLIST ──\nfunction renderWatchlist(){\n  document.getElementById('wlBadge').textContent=watchlist.length;\n  const el=document.getElementById('wlContent');\n  if(!watchlist.length){el.innerHTML=`<div class=\"wl-empty\"><div class=\"wl-empty-icon\">⭐<\u002Fdiv><div style=\"font-size:15px;font-weight:600;margin-bottom:6px\">Your watchlist is empty<\u002Fdiv><div style=\"font-size:13px;color:var(--text2)\">Search for stocks and add them here<\u002Fdiv><\u002Fdiv>`;return;}\n  const items=watchlist.map(sym=>STOCKS.find(s=>s.sym===sym)).filter(Boolean);\n  el.innerHTML=`<div class=\"wl-table-wrap\"><table>\n    <thead><tr><th>#<\u002Fth><th>Symbol<\u002Fth><th>Company<\u002Fth><th>Sector<\u002Fth><th>Price (₹)<\u002Fth><th>Change<\u002Fth><th>Mkt Cap<\u002Fth><th>Action<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>${items.map((s,i)=>`<tr>\n      <td style=\"color:var(--text3)\">${i+1}<\u002Ftd>\n      <td class=\"wl-sym-cell\">${s.sym}<\u002Ftd>\n      <td style=\"color:var(--text2)\">${s.name}<\u002Ftd>\n      <td><span class=\"tag\">${s.sector}<\u002Fspan><\u002Ftd>\n      <td class=\"wl-price-cell\">₹${fp(s.price)}<\u002Ftd>\n      <td class=\"wl-chg-cell ${s.chg>=0?'pos':'neg'}\">${fc(s.chg)}<\u002Ftd>\n      <td style=\"color:var(--text2);font-family:var(--mono)\">₹${s.mcap}T<\u002Ftd>\n      <td><button class=\"btn-rm\" onclick=\"wlRemove('${s.sym}')\">Remove<\u002Fbutton><\u002Ftd>\n    <\u002Ftr>`).join('')}<\u002Ftbody>\n  <\u002Ftable><\u002Fdiv>`;\n}\nfunction wlAdd(sym){\n  if(!sym){sym=document.getElementById('wlInput').value.trim().toUpperCase();document.getElementById('wlInput').value='';document.getElementById('wlDrop').classList.remove('open');}\n  if(!sym) return;\n  const s=STOCKS.find(x=>x.sym===sym); if(!s) return;\n  if(!watchlist.includes(sym)){watchlist.push(sym);localStorage.setItem('stk_wl',JSON.stringify(watchlist));}\n  renderWatchlist();\n}\nfunction wlRemove(sym){\n  watchlist=watchlist.filter(s=>s!==sym);\n  localStorage.setItem('stk_wl',JSON.stringify(watchlist));\n  renderWatchlist();\n}\n\n// ── SEARCH ──\nfunction setupSearch(inputId,dropId,onSelect){\n  const inp=document.getElementById(inputId);\n  const drop=document.getElementById(dropId);\n  inp.addEventListener('input',function(){\n    const q=this.value.trim().toUpperCase();\n    if(!q){drop.classList.remove('open');return;}\n    const hits=STOCKS.filter(s=>s.sym.includes(q)||s.name.toUpperCase().includes(q)).slice(0,8);\n    if(!hits.length){drop.classList.remove('open');return;}\n    drop.innerHTML=hits.map(s=>`<div class=\"sdr\" onclick=\"(${onSelect.toString()})('${s.sym}')\">\n      <div class=\"sdr-l\"><span class=\"sdr-sym\">${s.sym}<\u002Fspan><span class=\"sdr-name\">${s.name}<\u002Fspan><\u002Fdiv>\n      <div class=\"sdr-r\"><div class=\"sdr-price\" style=\"color:var(--text)\">₹${fp(s.price)}<\u002Fdiv><div class=\"sdr-chg ${s.chg>=0?'pos':'neg'}\">${fc(s.chg)}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>`).join('');\n    drop.classList.add('open');\n  });\n}\nsetupSearch('searchInput','searchDrop',function(sym){\n  document.getElementById('searchInput').value='';\n  document.getElementById('searchDrop').classList.remove('open');\n  const s=STOCKS.find(x=>x.sym===sym); if(s) openPopup(s);\n});\nsetupSearch('wlInput','wlDrop',function(sym){\n  document.getElementById('wlInput').value=sym;\n  document.getElementById('wlDrop').classList.remove('open');\n});\ndocument.addEventListener('click',e=>{\n  if(!e.target.closest('.search-zone')) document.getElementById('searchDrop').classList.remove('open');\n  if(!e.target.closest('.wl-add')) document.getElementById('wlDrop').classList.remove('open');\n  if(!e.target.closest('.user-zone')) document.querySelectorAll('.user-menu').forEach(m=>m.classList.remove('open'));\n});\n\n// ── POPUP ──\nfunction openPopup(s){\n  if(!s) return; popStock=s;\n  const isPos=s.chg>=0;\n  document.getElementById('popSym').textContent=s.sym;\n  document.getElementById('popName').textContent=s.name;\n  document.getElementById('popPrice').textContent='₹'+fp(s.price);\n  document.getElementById('popPrice').style.color=isPos?'var(--green)':'var(--red)';\n  document.getElementById('popChg').textContent=(isPos?'▲ ':'▼ ')+Math.abs(s.chg).toFixed(2)+'%  today';\n  document.getElementById('popChg').style.color=isPos?'var(--green)':'var(--red)';\n  document.getElementById('popSector').textContent=s.sector;\n  document.getElementById('popMcap').textContent='₹'+s.mcap+'T';\n  document.getElementById('popHigh').textContent='₹'+fp(s.price*1.18);\n  document.getElementById('popLow').textContent='₹'+fp(s.price*0.78);\n  document.getElementById('popOverlay').classList.add('open');\n  document.getElementById('stockPopup').classList.add('open');\n}\nfunction closePopup(){\n  document.getElementById('popOverlay').classList.remove('open');\n  document.getElementById('stockPopup').classList.remove('open');\n  popStock=null;\n}\nfunction popAddWl(){if(popStock){wlAdd(popStock.sym);closePopup();}}\n\n// ── TABS ──\nfunction goTab(name){\n  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('on'));\n  document.querySelectorAll('.tnb').forEach(b=>b.classList.remove('on'));\n  document.getElementById('pane-'+name).classList.add('on');\n  document.getElementById('tb-'+name).classList.add('on');\n  if(name==='market'){\n    const idx=INDICES.find(x=>x.id===activeIdx);\n    const filtered=STOCKS.filter(s=>s.idx.some(t=>idx.tags.includes(t)));\n    requestAnimationFrame(()=>requestAnimationFrame(()=>buildTreemap(filtered,'mainHeatmap',430)));\n  }\n}\n\n// ── VINTAGE CLOCK ──\nfunction setupClock(){\n  const svg=document.getElementById('vintClock');\n  const ns='http://www.w3.org/2000/svg';\n  const cx=28,cy=28;\n  // Defs\n  const defs=document.createElementNS(ns,'defs');\n  defs.innerHTML=`\n    <radialGradient id=\"rimG\" cx=\"50%\" cy=\"35%\" r=\"58%\">\n      <stop offset=\"0%\" stop-color=\"#d4a843\"/>\n      <stop offset=\"45%\" stop-color=\"#9a6e1f\"/>\n      <stop offset=\"100%\" stop-color=\"#5a3e10\"/>\n    <\u002FradialGradient>\n    <radialGradient id=\"faceG\" cx=\"50%\" cy=\"40%\" r=\"60%\">\n      <stop offset=\"0%\" stop-color=\"#140d02\"/>\n      <stop offset=\"100%\" stop-color=\"#080400\"/>\n    <\u002FradialGradient>`;\n  svg.insertBefore(defs,svg.firstChild);\n  const ins=(tag,attrs,before)=>{const el=document.createElementNS(ns,tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));svg.insertBefore(el,before||svg.firstChild);return el;};\n  const hH=document.getElementById('hHand');\n  ins('circle',{cx,cy,r:27,fill:'url(#rimG)'},hH);\n  ins('circle',{cx,cy,r:24,fill:'none',stroke:'#2d1c06','stroke-width':'0.8'},hH);\n  ins('circle',{cx,cy,r:23,fill:'url(#faceG)'},hH);\n  ins('circle',{cx,cy,r:21.5,fill:'none',stroke:'rgba(200,160,40,0.06)','stroke-width':'0.5'},hH);\n  // Tick marks\n  for(let h=0;h<60;h++){\n    const a=(h*6-90)*Math.PI/180;\n    const isMaj=h%5===0;\n    const or=21.5, ir=isMaj?17.5:19.5;\n    ins('line',{x1:cx+or*Math.cos(a),y1:cy+or*Math.sin(a),x2:cx+ir*Math.cos(a),y2:cy+ir*Math.sin(a),stroke:'#c8a84b','stroke-width':isMaj?'1.4':'0.5','stroke-linecap':'round'},hH);\n  }\n  // BSE label\n  const bse=document.createElementNS(ns,'text');\n  bse.setAttribute('x',cx); bse.setAttribute('y',cy-4);\n  bse.setAttribute('text-anchor','middle'); bse.setAttribute('fill','rgba(200,168,75,0.55)');\n  bse.setAttribute('font-family','IM Fell English, Georgia, serif'); bse.setAttribute('font-size','4.5');\n  bse.setAttribute('letter-spacing','2'); bse.textContent='BSE';\n  svg.insertBefore(bse,hH);\n  // IST label\n  const ist=document.createElementNS(ns,'text');\n  ist.setAttribute('x',cx); ist.setAttribute('y',cy+9);\n  ist.setAttribute('text-anchor','middle'); ist.setAttribute('fill','rgba(200,168,75,0.4)');\n  ist.setAttribute('font-family','IM Fell English, Georgia, serif'); ist.setAttribute('font-size','3.8');\n  ist.textContent='I · S · T';\n  svg.insertBefore(ist,hH);\n  // Shine\n  ins('ellipse',{cx:cx-3,cy:cy-10,rx:4.5,ry:2.5,fill:'rgba(255,255,240,0.03)',transform:`rotate(-35,${cx-3},${cy-10})`},hH);\n  // Re-order cap to be above hands\n  const cap=document.getElementById('clockCap');\n  svg.appendChild(cap);\n  const cenDot=document.createElementNS(ns,'circle');\n  cenDot.setAttribute('cx',cx); cenDot.setAttribute('cy',cy);\n  cenDot.setAttribute('r','1.1'); cenDot.setAttribute('fill','#3d2800');\n  svg.appendChild(cenDot);\n  // Outer glow\n  ins('circle',{cx,cy,r:27,fill:'none',stroke:'rgba(200,160,40,0.12)','stroke-width':'1.5'});\n}\n\nfunction updateClock(){\n  const now=new Date();\n  const ist=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));\n  const h=ist.getHours()%12, m=ist.getMinutes(), s=ist.getSeconds();\n  const cx=28,cy=28;\n  const hA=((h*60+m)/720*360-90)*Math.PI/180;\n  const mA=((m*60+s)/3600*360-90)*Math.PI/180;\n  const sA=(s/60*360-90)*Math.PI/180;\n  const sh=(id,a,len,back)=>{\n    const el=document.getElementById(id);\n    el.setAttribute('x1',cx+back*Math.cos(a+Math.PI));\n    el.setAttribute('y1',cy+back*Math.sin(a+Math.PI));\n    el.setAttribute('x2',cx+len*Math.cos(a));\n    el.setAttribute('y2',cy+len*Math.sin(a));\n  };\n  sh('hHand',hA,11,3);\n  sh('mHand',mA,14.5,4);\n  sh('sHand',sA,17,5);\n}\n\n// ── GOOGLE LOGIN ──\nfunction renderAuth(){\n  const zone=document.getElementById('authZone');\n  if(currentUser){\n    const initial=currentUser.name.charAt(0).toUpperCase();\n    const hue=(currentUser.name.charCodeAt(0)*37)%360;\n    zone.innerHTML=`<div class=\"user-zone\" onclick=\"toggleUserMenu()\">\n      <div class=\"user-ava\" style=\"background:hsl(${hue},60%,55%)\">${initial}<\u002Fdiv>\n      <span class=\"user-name\">${currentUser.name}<\u002Fspan>\n      <span style=\"color:var(--text3);font-size:10px\">▾<\u002Fspan>\n      <div class=\"user-menu\" id=\"userMenu\">\n        <div class=\"user-menu-item\">👤 ${currentUser.email}<\u002Fdiv>\n        <div class=\"user-menu-item\">⭐ My Watchlist (${watchlist.length})<\u002Fdiv>\n        <div class=\"user-menu-item\" onclick=\"doLogout()\">🚪 Sign Out<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  } else {\n    zone.innerHTML=`<button class=\"g-login-btn\" id=\"loginBtn\" onclick=\"openGoogleModal()\">\n      <svg width=\"15\" height=\"15\" viewBox=\"0 0 18 18\"><path d=\"M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908C16.658 14.215 17.64 11.907 17.64 9.2z\" fill=\"#4285F4\"/><path d=\"M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z\" fill=\"#34A853\"/><path d=\"M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z\" fill=\"#FBBC05\"/><path d=\"M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z\" fill=\"#EA4335\"/><\u002Fsvg>\n      Sign in\n    <\u002Fbutton>`;\n  }\n}\nfunction toggleUserMenu(){\n  const m=document.getElementById('userMenu'); if(m) m.classList.toggle('open');\n}\nfunction openGoogleModal(){\n  document.getElementById('gOverlay').classList.add('open');\n  document.getElementById('gModal').classList.add('open');\n}\nfunction closeGoogleModal(){\n  document.getElementById('gOverlay').classList.remove('open');\n  document.getElementById('gModal').classList.remove('open');\n}\nfunction doGoogleLogin(){\n  const email=document.getElementById('gEmailInput').value.trim()||'trader@gmail.com';\n  const name=email.split('@')[0].replace(/\\./g,' ').replace(/\\b\\w/g,l=>l.toUpperCase());\n  currentUser={name,email};\n  sessionStorage.setItem('stk_user',JSON.stringify(currentUser));\n  closeGoogleModal();\n  renderAuth();\n}\nfunction doLogout(){\n  currentUser=null; sessionStorage.removeItem('stk_user'); renderAuth();\n}\n\n// ── LIVE SIMULATION ──\nfunction simulatePrices(){\n  STOCKS.forEach(s=>{\n    const d=(Math.random()-.5)*0.07;\n    s.chg=parseFloat(Math.max(-9.9,Math.min(9.9,s.chg+d)).toFixed(2));\n    s.price=parseFloat((s.price*(1+d*0.01)).toFixed(2));\n  });\n  INDICES.forEach(idx=>{\n    const d=(Math.random()-.5)*0.04;\n    idx.chg=parseFloat(Math.max(-9.9,Math.min(9.9,idx.chg+d)).toFixed(2));\n    idx.val=parseFloat((idx.val*(1+d*0.005)).toFixed(2));\n  });\n  buildTicker();\n  const idx=INDICES.find(x=>x.id===activeIdx);\n  const filtered=STOCKS.filter(s=>s.idx.some(t=>idx.tags.includes(t)));\n  renderMovers(filtered);\n  buildIndexSelector();\n  if(document.getElementById('pane-market').classList.contains('on'))\n    buildTreemap(filtered,'mainHeatmap',430);\n}\nsetInterval(simulatePrices,6000);\n\n// ── PARTICLE BG ──\n(function(){\n  const canvas=document.getElementById('bgCanvas');\n  const ctx=canvas.getContext('2d');\n  let W,H;\n  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}\n  resize(); window.addEventListener('resize',resize);\n  const N=50;\n  const pts=Array.from({length:N},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.8+.4,o:Math.random()*.4+.1}));\n  function frame(){\n    ctx.clearRect(0,0,W,H);\n    for(let i=0;i<N;i++){\n      for(let j=i+1;j<N;j++){\n        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;\n        const d=Math.sqrt(dx*dx+dy*dy);\n        if(d<140){ctx.beginPath();ctx.strokeStyle=`rgba(0,229,255,${0.07*(1-d/140)})`;ctx.lineWidth=.5;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}\n      }\n      const p=pts[i];\n      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(79,195,247,${p.o})`;ctx.fill();\n      p.x+=p.vx;p.y+=p.vy;\n      if(p.x<0||p.x>W) p.vx*=-1;\n      if(p.y<0||p.y>H) p.vy*=-1;\n    }\n    requestAnimationFrame(frame);\n  }\n  frame();\n})();\n\n// ── INIT ──\nwindow.addEventListener('load',()=>{\n  setupClock();\n  updateClock();\n  setInterval(updateClock,1000);\n  buildTicker();\n  buildIndexSelector();\n  renderMovers();\n  renderSectors();\n  renderWatchlist();\n  renderAuth();\n  requestAnimationFrame(()=>requestAnimationFrame(()=>{\n    const idx=INDICES.find(x=>x.id==='n50');\n    buildTreemap(STOCKS.filter(s=>s.idx.includes('n50')),'mainHeatmap',430);\n  }));\n});\nwindow.addEventListener('resize',()=>{\n  clearTimeout(window._rt);\n  window._rt=setTimeout(()=>{\n    const idx=INDICES.find(x=>x.id===activeIdx);\n    const filtered=STOCKS.filter(s=>s.idx.some(t=>idx.tags.includes(t)));\n    if(document.getElementById('pane-market').classList.contains('on'))\n      buildTreemap(filtered,'mainHeatmap',430);\n    if(document.getElementById('secDetailWrap').style.display!=='none' && activeSecStocks.length)\n      buildTreemap(activeSecStocks,'secHeatmap',380);\n  },250);\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
